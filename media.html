<script src="./componentes.js"></script>
    
	<script>
		const slides = document.querySelectorAll('.carrusel-slide');
		const btnNext = document.querySelector('.carrusel-btn.next');
		const btnPrev = document.querySelector('.carrusel-btn.prev');
		let slideActual = 0;
		let intervalo;

		function mostrarSlide(index) {
			slides.forEach(slide => slide.classList.remove('active'));
			if (index >= slides.length) slideActual = 0;
			else if (index < 0) slideActual = slides.length - 1;
			else slideActual = index;
			slides[slideActual].classList.add('active');
		}

		function cambiarManualmente(direccion) {
			clearInterval(intervalo);
			mostrarSlide(slideActual + direccion);
			iniciarAutoplay();
		}

		function iniciarAutoplay() {
			intervalo = setInterval(() => {
				mostrarSlide(slideActual + 1);
			}, 5000);
		}

		btnNext.addEventListener('click', () => cambiarManualmente(1));
		btnPrev.addEventListener('click', () => cambiarManualmente(-1));

		iniciarAutoplay();
	</script>
