<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CFC - Media</title>
	
	<link rel="icon" href="logo.png">
	<link rel="stylesheet" href="style.css">
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
	<style>
		/* Ajuste extra para que el primer título no quede tapado por la navbar fixed */

			padding-top: 140px; 
		}

</head>
<body>

	<div id="menu-contenedor"></div>

	<section class="galeria-section seccion-principal fade-in">
		<div class="text-center mb-20">
			<h2 style="font-size: 2.5rem; color: var(--texto-principal);">Nuestra Familia en Acción</h2>

			</button>
            
			<div class="carrusel-slide active"><img src="img/1.jpg" alt="Familia CFC 1"></div>
			<div class="carrusel-slide"><img src="img/2.jpg" alt="Familia CFC 2"></div>
			<div class="carrusel-slide"><img src="img/3.jpg" alt="Familia CFC 3"></div>
			<div class="carrusel-slide"><img src="img/4.jpg" alt="Familia CFC 4"></div>
			<div class="carrusel-slide"><img src="img/5.jpg" alt="Familia CFC 5"></div>
			<div class="carrusel-slide"><img src="img/6.jpg" alt="Familia CFC 6"></div>
			<div class="carrusel-slide"><img src="img/7.jpg" alt="Familia CFC 7"></div>
			<div class="carrusel-slide"><img src="img/8.jpg" alt="Familia CFC 8"></div>
			<div class="carrusel-slide"><img src="img/9.jpg" alt="Familia CFC 9"></div>
			<div class="carrusel-slide"><img src="img/10.jpg" alt="Familia CFC 10"></div>
			<div class="carrusel-slide"><img src="img/11.jpg" alt="Familia CFC 11"></div>

			<button class="carrusel-btn next">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
			</button>
		</div>
	</section>

	<section class="media-section fade-in delay" style="padding-top: 40px;">
        
		<div class="text-center mb-20">
			<h2 style="font-size: 2.5rem; color: var(--texto-principal);">Reviví nuestros mensajes</h2>
			<p style="color: var(--texto-secundario);">Prédicas, momentos de adoración y la vida de nuestra iglesia.</p>
		</div>

		<div class="video-grid">
			<div class="video-card">
				<div class="video-responsive">
					<iframe src="https://www.youtube.com/embed/SmYQDuMh9J0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
				</div>
			</div>

			<div class="video-card">
				<div class="video-responsive">
					<iframe src="https://www.youtube.com/embed/NoCvgEU3ICg" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
				</div>
			</div>

			<div class="video-card">
				<div class="video-responsive">
					<iframe src="https://www.youtube.com/embed/cMTVMPgN3WY" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
				</div>
			</div>

			<div class="video-card">
				<div class="video-responsive">
					<iframe src="https://www.youtube.com/embed/fbtG1n3BOec" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
				</div>

				</div>
			</div>

				<div class="video-responsive">
					<iframe src="https://www.youtube.com/embed/4o9wMHzgPaE" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
				</div>
			</div>
		</div>
        
		<div class="text-center mt-60">
			<a href="https://youtube.com/@cfc.casanova" target="_blank" class="btn-cta">Ver todos en YouTube</a>
		</div>
	</section>

	<div id="footer-contenedor"></div>

<script src="./componentes.js"></script>
    
	<script>
		const slides = document.querySelectorAll('.carrusel-slide');
		const btnNext = document.querySelector('.carrusel-btn.next');
		const btnPrev = document.querySelector('.carrusel-btn.prev');
		let slideActual = 0;
		let intervalo;

		function mostrarSlide(index) {
			slides.forEach(slide => slide.classList.remove('active'));
			if (index >= slides.length) slideActual = 0;
			else if (index < 0) slideActual = slides.length - 1;
			else slideActual = index;
			slides[slideActual].classList.add('active');
		}

		function cambiarManualmente(direccion) {
			clearInterval(intervalo);
			mostrarSlide(slideActual + direccion);
			iniciarAutoplay();
		}

		function iniciarAutoplay() {
			intervalo = setInterval(() => {
				mostrarSlide(slideActual + 1);
			}, 5000);
		}

		btnNext.addEventListener('click', () => cambiarManualmente(1));
		btnPrev.addEventListener('click', () => cambiarManualmente(-1));

		iniciarAutoplay();
	</script>
</body>
</html>
